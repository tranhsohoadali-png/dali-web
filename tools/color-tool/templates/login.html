<!DOCTYPE html>
<html lang="vi" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Đăng nhập · Index Color + DALI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-body-tertiary">
<div class="container" style="max-width: 420px;">
  <div class="card shadow-sm mt-5">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <i class="bi bi-palette-fill text-success fs-1"></i>
        <h4 class="mt-2 mb-0">Index Color + DALI</h4>
        <div class="text-secondary small">Đăng nhập để tiếp tục</div>
      </div>

      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-warning py-2 small">{{ message }}</div>
        {% endfor %}
      {% endif %}

      <form action="login" method="POST">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label" for="username">Tài khoản</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" id="username" name="username" class="form-control" required autofocus/>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label" for="password">Mật khẩu</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" id="password" name="password" class="form-control" required/>
          </div>
        </div>
        <button type="submit" class="btn btn-success w-100">
          <i class="bi bi-box-arrow-in-right"></i> Đăng nhập
        </button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
